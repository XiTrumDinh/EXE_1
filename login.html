<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .container {
            width: 600px;
            margin: auto;
        }

        .header,
        .footer {
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
        }

        .content {
            border: 1px solid black;
            padding: 20px;
            margin-top: 10px;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            margin: auto;
        }

        td {
            padding: 5px;
        }

        .actions {
            text-align: right;
        }

        a {
            margin-right: 10px;
            font-size: 13px;
        }

        button {
            padding: 5px 10px;
        }
    </style>

</head>

<body>

    <div class="container-fluid">
        <div class="header">
            <a href="index.html">Home</a> |
            <a href="login.html">Đăng nhập</a> |
            <a href="register.html">Đăng ký</a>
        </div>
    </div>
    <div class="container">
        <div class="content">
            <h3>Màn hình đăng nhập</h3>

            <form>
                <table>
                    <tr>
                        <td>Username</td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td>Password</td>
                        <td><input type="password"></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <input type="checkbox"> Ghi nhớ đăng nhập
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" class="actions">
                            <a href="register.html">Quên mật khẩu?</a>
                            <button type="submit">Đăng nhập</button>
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>

    <div class="footer">
        Lập trình web @1/2024
    </div>
</body>

</html>
